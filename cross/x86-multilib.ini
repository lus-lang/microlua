# MicroLua cross file: native x86-64 host building a true 32-bit (i686) binary.
#
# This is not a "cross" compile in the usual sense — it runs on the same host —
# but it produces a genuine 32-bit ABI where __LP64__ is undefined, so UPtr is
# U32 and MLuaValue is a real 32-bit value word. That selects the alignment-
# tagging representation (MLUA_PTR_SIZE auto-detects to 4) and exercises boxed
# integers, short-string packing, and MakePtr with real 32-bit pointers, while
# still running the full test suite natively.
#
# Requires 32-bit libc: Fedora `dnf install glibc-devel.i686 libgcc.i686`,
# Debian/Ubuntu `apt install gcc-multilib`.
#
#   meson setup build-m32 --cross-file cross/x86-multilib.ini
#   meson test -C build-m32

[binaries]
c = 'gcc'

[properties]
# The i686 binaries run natively on the x86-64 build host, so meson should
# execute the test suite rather than skip it as a cross build.
needs_exe_wrapper = false

[built-in options]
c_args = ['-m32']
c_link_args = ['-m32']

[host_machine]
system = 'linux'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'
