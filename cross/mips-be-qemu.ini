# MicroLua cross file: big-endian 32-bit MIPS (o32) under qemu-user.
#
# The complement of x86-multilib.ini: that file exercises the 32-bit tagging
# representation on a little-endian host; this one runs the same full suite
# BIG-endian — the only automated endianness coverage (bytecode
# byte-swapping, word packing) short of real hardware (platform/irix/).
# Binaries link -static so qemu-user needs no target sysroot at runtime.
#
# Requires gcc-mips-linux-gnu + libc6-dev-mips-cross + qemu-user. Debian
# buster is the last release shipping the big-endian 32-bit cross gcc; on
# newer hosts (or macOS) use tools/mips_be_docker.sh, which runs this file
# inside a buster container.
#
#   meson setup build-mipsbe --cross-file cross/mips-be-qemu.ini
#   meson test -C build-mipsbe

[binaries]
c = 'mips-linux-gnu-gcc'
ar = 'mips-linux-gnu-ar'
strip = 'mips-linux-gnu-strip'
exe_wrapper = 'qemu-mips'

[properties]
needs_exe_wrapper = true

[built-in options]
c_link_args = ['-static']

[host_machine]
system = 'linux'
cpu_family = 'mips'
cpu = 'mips'
endian = 'big'
